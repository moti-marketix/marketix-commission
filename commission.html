<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketix — Commission Calculator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f0f0ec;}

/* ── Login screen ── */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e 0%,#2d2b69 100%);}
.login-card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.login-logo{margin-bottom:28px;text-align:center;}
.login-logo img{height:36px;}
.login-title{font-size:20px;font-weight:700;margin-bottom:4px;text-align:center;}
.login-sub{font-size:13px;color:#888;margin-bottom:28px;text-align:center;}
.login-field{margin-bottom:16px;}
.login-field label{font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:5px;}
.login-field input{width:100%;font-size:14px;padding:10px 12px;border:1px solid #ddd;border-radius:8px;outline:none;transition:border 0.15s;}
.login-field input:focus{border-color:#4a3fe8;}
.login-btn{width:100%;padding:12px;background:#4a3fe8;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.15s;}
.login-btn:hover{background:#3730c8;}
.login-btn:disabled{background:#aaa;cursor:not-allowed;}
.login-error{background:#fdf0ee;color:#c0392b;border:1px solid #f5c6c0;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:14px;display:none;}

/* ── App layout ── */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:220px;min-width:220px;background:#1a1a2e;color:#fff;display:flex;flex-direction:column;overflow-y:auto;}
.sidebar-logo{padding:12px 14px;border-bottom:1px solid #2e2e4a;background:#ffffff;}
.sidebar-logo img{width:130px;display:block;}
.sidebar-section{padding:14px 14px 4px;font-size:10px;font-weight:700;color:#5555aa;letter-spacing:0.08em;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;font-size:13px;color:#c0c0e0;border-radius:7px;margin:2px 6px;transition:background 0.15s;}
.nav-item:hover{background:#2e2e4a;color:#fff;}
.nav-item.active{background:#4a3fe8;color:#fff;}
.nav-dot{width:8px;height:8px;border-radius:50%;background:#444488;flex-shrink:0;}
.nav-item.active .nav-dot{background:rgba(255,255,255,0.6);}
.nav-badge{margin-left:auto;background:#2a2a48;font-size:10px;padding:1px 6px;border-radius:10px;color:#8888cc;}
.nav-item.active .nav-badge{background:#3730c8;color:#fff;}
.sidebar-bottom{margin-top:auto;padding:12px 8px;border-top:1px solid #2e2e4a;}
.user-pill{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;font-size:12px;color:#c0c0e0;}
.user-avatar{width:28px;height:28px;border-radius:50%;background:#4a3fe8;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.logout-btn{background:transparent;border:none;color:#8888cc;font-size:11px;cursor:pointer;padding:2px 6px;border-radius:4px;margin-top:2px;display:block;width:100%;text-align:left;}
.logout-btn:hover{color:#fff;background:#2e2e4a;}

.main{flex:1;overflow-y:auto;background:#f0f0ec;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:#fff;border-bottom:1px solid #e0e0d8;position:sticky;top:0;z-index:10;}
.topbar h1{font-size:17px;font-weight:700;}
.topbar-right{display:flex;gap:8px;}
.content{padding:20px 24px;}

/* ── Buttons ── */
.btn{font-size:13px;padding:7px 14px;border-radius:7px;cursor:pointer;border:1px solid #ccc;background:#fff;color:#1a1a1a;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s;white-space:nowrap;}
.btn:hover{background:#f5f5f5;}
.btn-primary{background:#4a3fe8;color:#fff;border-color:#4a3fe8;}
.btn-primary:hover{background:#3730c8;}
.btn-danger{color:#c0392b;border-color:#e8c0bc;}
.btn-danger:hover{background:#fff0f0;}
.btn-sm{font-size:12px;padding:4px 10px;}

/* ── Cards ── */
.card{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:18px 20px;margin-bottom:16px;}
.card-title{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px;}
.fx-bar{display:flex;gap:20px;flex-wrap:wrap;align-items:center;padding:10px 16px;background:#f8f8f4;border-radius:8px;border:1px solid #e8e8e0;margin-bottom:16px;}
.fx-item{display:flex;align-items:center;gap:6px;font-size:13px;}
.fx-label{font-weight:700;font-size:13px;color:#4a3fe8;}
.fx-item input{width:78px;font-size:13px;padding:5px 8px;border:1px solid #ccc;border-radius:6px;text-align:right;}
.upload-zone{border:2px dashed #c0bce8;border-radius:10px;padding:24px;text-align:center;background:#f8f7ff;cursor:pointer;transition:all 0.2s;margin-bottom:12px;}
.upload-zone:hover,.upload-zone.drag{border-color:#4a3fe8;background:#eceaff;}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid #e0e0d8;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{font-size:11px;font-weight:600;color:#666;padding:9px 10px;border-bottom:1px solid #e8e8e0;text-align:left;white-space:nowrap;background:#fafaf8;}
td{padding:9px 10px;border-bottom:1px solid #f0f0ea;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafaf8;}
input.cell{width:100%;font-size:13px;padding:6px 8px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a;outline:none;}
input.cell:focus{border-color:#4a3fe8;}
input.cell.right{text-align:right;}
input.cell.center{text-align:center;}
.val{font-size:13px;font-weight:600;white-space:nowrap;}
.c-blue{color:#1a5fa8;} .c-green{color:#1a7a3a;} .c-amber{color:#b36b00;} .c-purple{color:#4a3fe8;}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.bg-green{background:#e6f4ea;color:#1a7a3a;} .bg-gray{background:#f0f0ea;color:#888;}
.bg-blue{background:#e8f0fe;color:#1a5fa8;}
.ppc-card{background:#f8f7ff;border:1px solid #c0bce8;border-radius:12px;padding:18px 20px;margin-bottom:16px;}
.ppc-title{font-size:11px;font-weight:700;color:#4a3fe8;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px;}
.totals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
.tot-card{background:#fff;border:1px solid #e0e0d8;border-radius:10px;padding:14px 16px;}
.tot-label{font-size:11px;color:#888;margin-bottom:4px;}
.tot-val{font-size:20px;font-weight:700;}
.log-item{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;border-radius:7px;font-size:12px;margin-bottom:4px;}
.log-item.success{background:#e6f4ea;} .log-item.error{background:#fdf0ee;} .log-item.warn{background:#fff8e6;}
.period-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.period-bar select,.form-input{font-size:13px;padding:6px 10px;border:1px solid #ccc;border-radius:7px;outline:none;background:#fff;cursor:pointer;}
.form-label{font-size:12px;font-weight:600;color:#555;margin-bottom:5px;display:block;}
.form-input{width:100%;font-size:14px;padding:8px 10px;}
.form-input:focus{border-color:#4a3fe8;}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;}
.alert-info{background:#e8f0fe;color:#1a5fa8;border:1px solid #b8d0fc;}
.saving-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#888;padding:4px 10px;background:#f0f0ea;border-radius:20px;}
.saving-badge.saved{color:#1a7a3a;background:#e6f4ea;}
</style>
</head>

let fx={EUR:1.08,CAD:0.73,GBP:1.27};

// Per-client data - loaded from Supabase
let cdata={};
Object.keys(CLIENTS).forEach(id=>{
  cdata[id]={ppcAdSpend:0,extraCharges:[],marketData:{}};
  CLIENTS[id].markets.forEach(m=>{
    cdata[id].marketData[m]={income:0,adSpend:0,pct:CLIENTS[id].defaultPct,uploaded:false};
  });
});

// ── Helpers ───────────────────────────────────────────────────────
function fxRate(ccy){return ccy==='USD'?1:(fx[ccy]||1);}
function toUSD(amt,ccy){return (parseFloat(amt)||0)*fxRate(ccy);}
function fmt(n){return new Intl.NumberFormat('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}).format(Math.round(n||0));}
function clientIncomeUSD(id){return CLIENTS[id].markets.reduce((s,m)=>s+toUSD(cdata[id].marketData[m]?.income||0,CCY[m]),0);}
function clientCommUSD(id){return CLIENTS[id].markets.reduce((s,m)=>{const md=cdata[id].marketData[m];return s+toUSD(md?.income||0,CCY[m])*((md?.pct||0)/100);},0);}
function clientAdSpendUSD(id){return CLIENTS[id].markets.reduce((s,m)=>s+toUSD(cdata[id].marketData[m]?.adSpend||0,CCY[m]),0);}
function clientPPC(id){return (CLIENTS[id].ppcBasic?350:0)+clientAdSpendUSD(id)*(CLIENTS[id].ppcAdPct/100);}
function clientExtras(id){return (cdata[id].extraCharges||[]).reduce((s,c)=>s+(parseFloat(c.amt)||0),0);}
function clientTotal(id){return clientCommUSD(id)+clientPPC(id)+clientExtras(id);}

// ── Auth ──────────────────────────────────────────────────────────
async function initAuth(){
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    currentUser=session.user;
    showApp();
  } else {
    showLogin();
  }
  sb.auth.onAuthStateChange((_,session)=>{
    if(session){currentUser=session.user;showApp();}
    else{currentUser=null;showLogin();}
  });
}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  const btn=document.getElementById('login-btn');
  const errEl=document.getElementById('login-error');
  errEl.style.display='none';
  btn.disabled=true; btn.textContent='Signing in...';
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error){
    errEl.textContent=error.message==='Invalid login credentials'?'Incorrect email or password.':error.message;
    errEl.style.display='block';
    btn.disabled=false; btn.textContent='Sign in';
  }
}

async function doLogout(){
  await sb.auth.signOut();
}

function showLogin(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';

  document.getElementById('login-password').onkeydown=e=>{if(e.key==='Enter')doLogin();};

async function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  // Set user info
  const email=currentUser.email||'';
  const initials=email.split('@')[0].slice(0,2).toUpperCase();

// ── Supabase data ─────────────────────────────────────────────────
async function loadFromSupabase(){
  const {data,error}=await sb.from('commission_data')
    .select('*')
    .eq('month',selectedMonth)
    .eq('year',selectedYear);
  if(error){console.error('Load error:',error);return;}
  if(!data||!data.length) return;
  data.forEach(row=>{
    if(!cdata[row.client_id]||!cdata[row.client_id].marketData[row.market]) return;
    cdata[row.client_id].marketData[row.market].income=row.income||0;
    cdata[row.client_id].marketData[row.market].adSpend=row.ad_spend||0;
    cdata[row.client_id].marketData[row.market].pct=row.comm_pct||CLIENTS[row.client_id]?.defaultPct||5;
    cdata[row.client_id].marketData[row.market].uploaded=true;
    if(row.fx_eur) fx.EUR=row.fx_eur;
    if(row.fx_cad) fx.CAD=row.fx_cad;
    if(row.fx_gbp) fx.GBP=row.fx_gbp;
  });

  // Load extras
  const {data:extras}=await sb.from('commission_extras')
    .select('*').eq('month',selectedMonth).eq('year',selectedYear);
  if(extras){
    extras.forEach(row=>{
      if(!cdata[row.client_id]) return;
      if(!cdata[row.client_id].extraCharges) cdata[row.client_id].extraCharges=[];
      // avoid duplicates
      if(!cdata[row.client_id].extraCharges.find(e=>e.sb_id===row.id)){
        cdata[row.client_id].extraCharges.push({sb_id:row.id,desc:row.description,amt:row.amount_usd});
      }
    });
  }
}

function showSaving(saved){
  const el=document.getElementById('save-status');
  el.style.display='inline-flex';
  el.className='saving-badge'+(saved?' saved':'');
  el.textContent=saved?'✓ Saved':'Saving...';
  if(saved) setTimeout(()=>{el.style.display='none';},2000);
}

async function saveMarketData(clientId,market){
  showSaving(false);
  const md=cdata[clientId].marketData[market];
  const ccy=CCY[market];
  const {error}=await sb.from('commission_data').upsert({
    client_id:clientId, market, month:selectedMonth, year:selectedYear,
    currency:ccy, income:md.income||0, ad_spend:md.adSpend||0,
    comm_pct:md.pct||CLIENTS[clientId].defaultPct,
    fx_eur:fx.EUR, fx_cad:fx.CAD, fx_gbp:fx.GBP,
    uploaded_by:currentUser.id,
  },{onConflict:'client_id,market,month,year'});
  if(error) console.error('Save error:',error);
  else showSaving(true);
}

async function saveExtra(clientId,idx){
  const ch=cdata[clientId].extraCharges[idx];
  if(ch.sb_id){
    await sb.from('commission_extras').update({description:ch.desc,amount_usd:ch.amt}).eq('id',ch.sb_id);
  } else {
    const {data}=await sb.from('commission_extras').insert({
      client_id:clientId,month:selectedMonth,year:selectedYear,
      description:ch.desc,amount_usd:ch.amt
    }).select().single();
    if(data) cdata[clientId].extraCharges[idx].sb_id=data.id;
  }
  showSaving(true);
}

async function deleteExtra(clientId,idx){
  const ch=cdata[clientId].extraCharges[idx];
  if(ch.sb_id) await sb.from('commission_extras').delete().eq('id',ch.sb_id);
  cdata[clientId].extraCharges.splice(idx,1);
  renderClient(clientId);
}

// ── PDF Parsing ───────────────────────────────────────────────────
function parseEUorUS(s){
  s=s.trim().replace(/\s/g,'');
  const lc=s.lastIndexOf(','),lp=s.lastIndexOf('.');
  if(lc>lp){return parseFloat(s.replace(/\./g,'').replace(',','.'))||0;}
  return parseFloat(s.replace(/,/g,''))||0;
}

function isNumberToken(t){
  return /^\d+([.,]\d{2,3})*([.,]\d{1,2})?$/.test(t.replace(/\s/g,''))&&!t.startsWith('-');
}

async function extractDataFromPDF(file){
  const ab=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:ab}).promise;
  let allItems=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const tc=await page.getTextContent();
    tc.items.forEach(item=>{
      if(item.str.trim()) allItems.push({str:item.str.trim(),x:Math.round(item.transform[4]),y:Math.round(item.transform[5])});
    });
  }
  const lineMap={};
  allItems.forEach(item=>{
    const yk=Object.keys(lineMap).find(k=>Math.abs(parseInt(k)-item.y)<=4);
    if(yk) lineMap[yk].push(item); else lineMap[item.y]=[item];
  });
  const sortedYs=Object.keys(lineMap).map(Number).sort((a,b)=>b-a);
  const lines=sortedYs.map(y=>lineMap[y].sort((a,b)=>a.x-b.x).map(i=>i.str).join(' '));
  let income=0;
  for(const line of lines){
    if(income>0) break;
    for(const key of INCOME_KEYS){
      if(line.startsWith(key+' ')||line===key){
        const tokens=line.split(/\s+/);
        for(let i=tokens.length-1;i>=0;i--){
          const t=tokens[i].replace(/[,.]$/,'');
          if(isNumberToken(t)){const val=parseEUorUS(t);if(val>0){income=val;break;}}
        }
      }
      if(income>0) break;
    }
  }
  if(!income){
    for(let li=0;li<lines.length&&!income;li++){
      for(const key of INCOME_KEYS){
        if(lines[li].startsWith(key+' ')||lines[li]===key){
          for(let offset=1;offset<=2&&!income;offset++){
            const checkLine=lines[li+offset];
            if(!checkLine) continue;
            const tokens=checkLine.split(/\s+/);
            for(let i=tokens.length-1;i>=0;i--){
              const t=tokens[i].replace(/[,.]$/,'');
              if(isNumberToken(t)){const val=parseEUorUS(t);if(val>0){income=val;break;}}
            }
          }
        }
        if(income) break;
      }
    }
  }
  if(!income){
    const tokens=allItems.map(i=>i.str);
    for(let i=0;i<tokens.length&&!income;i++){
      if(INCOME_KEYS.includes(tokens[i])){
        for(let j=i+1;j<Math.min(i+15,tokens.length);j++){
          const t=tokens[j].replace(/[,.]$/,'');
          if(isNumberToken(t)){const val=parseEUorUS(t);if(val>0){income=val;break;}}
        }
      }
    }
  }
  const adSpend=extractAdSpendFromItems(allItems);
  return {income,adSpend};
}

function extractAdSpendFromItems(allItems){
  let keyY=null,keywordIdx=null;
  for(let i=0;i<allItems.length;i++){
    const s=allItems[i].str;
    for(const phrase of AD_PHRASES){
      if(s===phrase||s.includes(phrase)){keyY=allItems[i].y;keywordIdx=i;break;}
    }
    if(keyY!==null) break;
  }
  if(keyY===null){
    const tokens=allItems.map(i=>i.str);
    outer2:for(const keyArr of AD_KEYS){
      for(let i=0;i<tokens.length-keyArr.length;i++){
        let match=true;
        for(let k=0;k<keyArr.length;k++){if(tokens[i+k]!==keyArr[k]){match=false;break;}}
        if(match){keyY=allItems[i].y;keywordIdx=i;break outer2;}
      }
    }
  }
  if(keyY===null) return 0;
  const yGroups={};
  allItems.forEach(item=>{
    let bucket=null;
    for(const k of Object.keys(yGroups)){if(Math.abs(parseInt(k)-item.y)<=5){bucket=k;break;}}
    if(!bucket){yGroups[item.y]=[item];}else{yGroups[bucket].push(item);}
  });
  let lineItems=[];
  for(const k of Object.keys(yGroups)){
    if(Math.abs(parseInt(k)-keyY)<=5){lineItems=yGroups[k];break;}
  }
  const sorted=[...lineItems].sort((a,b)=>b.x-a.x);
  for(const item of sorted){
    const raw=item.str;
    const stripped=raw.replace(/^-/,'').replace(/[,.]$/,'');
    if(/^\d+([.,]\d{2,3})*([.,]\d{1,2})?$/.test(stripped)){
      const val=parseEUorUS(stripped);if(val>0) return val;
    }
  }
  if(keywordIdx!==null){
    for(let j=keywordIdx+1;j<Math.min(keywordIdx+12,allItems.length);j++){
      const raw=allItems[j].str;
      const stripped=raw.replace(/^-/,'').replace(/[,.]$/,'');
      if(/^\d+([.,]\d{2,3})*([.,]\d{1,2})?$/.test(stripped)){
        const val=parseEUorUS(stripped);if(val>0) return val;
      }
    }
  }
  return 0;
}

function parseFilename(filename){
  const base=filename.replace(/\.pdf$/i,'');
  let parts=base.split(/\s*-\s*/).filter(p=>p.trim().length>0);
  parts=parts.map(p=>p.trim().replace(/_+/g,' ').trim());
  if(parts.length<3) return null;
  const clientRaw=parts[0].toLowerCase().replace(/[\s_]/g,'');
  const marketRaw=parts[1].trim().toUpperCase().replace(/[\s_]/g,'');
  const month=parts[2].trim().charAt(0).toUpperCase()+parts[2].trim().slice(1).toLowerCase();
  let year=parseInt(parts[3])||new Date().getFullYear();
  if(isNaN(year)){const m=base.match(/20\d{2}/);year=m?parseInt(m[0]):new Date().getFullYear();}
  let clientId=null;
  for(const [alias,cid] of Object.entries(CLIENT_ALIASES)){
    if(clientRaw===alias||clientRaw.startsWith(alias)||alias.startsWith(clientRaw.slice(0,5))){clientId=cid;break;}
  }
  const market=MARKET_ALIASES[marketRaw]||null;
  return {clientId,market,month,year};
}

async function handleFiles(files){
  const logEl=document.getElementById('upload-results');
  if(logEl) logEl.innerHTML='<div class="log-item" style="background:#f0f0ea;">⏳ Processing '+files.length+' file(s)...</div>';
  const results=[];
  for(const file of files){
    if(!file.name.toLowerCase().endsWith('.pdf')){results.push({status:'error',msg:`${file.name} — not a PDF`});continue;}
    const info=parseFilename(file.name);
    if(!info||!info.clientId){results.push({status:'error',msg:`${file.name} — unknown client. Use: ClientName - Market - Month - Year.pdf`});continue;}
    if(!info.market){results.push({status:'error',msg:`${file.name} — unknown market`});continue;}
    if(!CLIENTS[info.clientId].markets.includes(info.market)){results.push({status:'warn',msg:`${file.name} — ${CLIENTS[info.clientId].name} has no market ${info.market}`});continue;}
    try{
      const {income,adSpend}=await extractDataFromPDF(file);
      cdata[info.clientId].marketData[info.market].income=income;
      cdata[info.clientId].marketData[info.market].adSpend=adSpend;
      cdata[info.clientId].marketData[info.market].uploaded=true;
      if(info.month) selectedMonth=info.month;
      if(info.year)  selectedYear=info.year;
      // Save to Supabase
      await saveMarketData(info.clientId,info.market);
      const ccy=CCY[info.market];
      const logEntry={filename:file.name,clientId:info.clientId,clientName:CLIENTS[info.clientId].name,
        market:info.market,month:info.month,year:info.year,income,adSpend,ccy,uploadedAt:new Date().toLocaleString()};
      uploadLog=uploadLog.filter(l=>!(l.clientId===info.clientId&&l.market===info.market&&l.month===info.month&&l.year===info.year));
      uploadLog.unshift(logEntry);
      results.push({status:'success',msg:`${CLIENTS[info.clientId].name} · ${info.market} — Income: ${fmt(income)} ${ccy} · Ad spend: ${fmt(adSpend)} ${ccy}`});
    }catch(e){results.push({status:'error',msg:`${file.name} — error: ${e.message}`});}
  }
  if(logEl) logEl.innerHTML=results.map(r=>`
    <div class="log-item ${r.status}">
      <span>${r.status==='success'?'✅':r.status==='warn'?'⚠️':'❌'}</span>
      <span>${r.msg}</span>
    </div>`).join('');
  buildNav();
  if(currentPage==='dashboard') renderDashboard();
  else if(currentClient) renderClient(currentClient);
}

// ── Nav ───────────────────────────────────────────────────────────
function buildNav(){
  document.getElementById('nav-clients').innerHTML=Object.entries(CLIENTS).map(([id,cl])=>{
    const up=cl.markets.filter(m=>cdata[id].marketData[m]?.uploaded).length;
    return `<div class="nav-item ${currentPage==='client'&&currentClient===id?'active':''}" id="nav-${id}" onclick="showPage('client','${id}')">
      <div class="nav-dot"></div><span>${cl.name}</span>
      <span class="nav-badge">${up>0?up+'/'+cl.markets.length:cl.markets.length}</span>
    </div>`;
  }).join('');
}

function showPage(page,clientId){
  currentPage=page;currentClient=clientId||null;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  if(page==='dashboard') document.querySelector('.nav-item')?.classList.add('active');
  else if(clientId) document.getElementById('nav-'+clientId)?.classList.add('active');
  const title=document.getElementById('page-title');
  const sub=document.getElementById('page-sub');
  const actions=document.getElementById('topbar-actions');
  if(page==='dashboard'){
    title.textContent='Overview';sub.textContent='All clients · '+selectedMonth+' '+selectedYear;
    actions.innerHTML=`<span class="saving-badge" id="save-status" style="display:none;"></span><button class="btn btn-primary" onclick="triggerUpload()">⬆ Upload Reports</button>`;
    renderDashboard();
  } else if(page==='client'){
    const cl=CLIENTS[clientId];
    title.textContent=cl.name;sub.textContent='Commission · '+selectedMonth+' '+selectedYear;
    actions.innerHTML=`<span class="saving-badge" id="save-status" style="display:none;"></span>
      <button class="btn" onclick="triggerUpload()">⬆ Upload</button>
      <button class="btn btn-primary" onclick="printInvoice('${clientId}')">🖨 Invoice PDF</button>`;
    renderClient(clientId);
  } else if(page==='settings'){
    title.textContent='Settings';sub.textContent='FX rates & commission defaults';
    actions.innerHTML=`<span class="saving-badge" id="save-status" style="display:none;"></span>`;
    renderSettings();
  }
  buildNav();
}

function triggerUpload(){
  const inp=document.createElement('input');
  inp.type='file';inp.multiple=true;inp.accept='.pdf';
  inp.onchange=e=>handleFiles(Array.from(e.target.files));inp.click();
}

  const ppcTot=ppcBasicAmt+ppcAdAmt;
  const commTot=clientCommUSD(id);
  const extrasTot=clientExtras(id);
  const grandTot=commTot+ppcTot+extrasTot;

  const mktRows=cl.markets.map(m=>{
    const md=cd.marketData[m]||{income:0,pct:cl.defaultPct,uploaded:false};
    const ccy=CCY[m];const iUSD=toUSD(md.income||0,ccy);const commM=iUSD*((md.pct||0)/100);

      +'<td><span class="badge '+(md.uploaded?'bg-green':'bg-gray')+'">'+(md.uploaded?'✓ Uploaded':'Manual')+'</span></td>'
      +'<td><input class="cell right" type="number" value="'+Math.round(md.income||0)+'" step="1"'
      +' onchange="cdata[\''+id+'\'].marketData[\''+m+'\'].income=parseFloat(this.value)||0;saveMarketData(\''+id+'\',\''+m+'\');renderClient(\''+id+'\')" />'
      +'<div style="font-size:11px;color:#888;margin-top:2px;">'+ccy+'</div></td>'
      +'<td style="text-align:right"><div class="val c-blue">$'+fmt(iUSD)+'</div>'
      +'<div style="font-size:11px;color:#888;">@ '+fxRate(ccy).toFixed(4)+'</div></td>'
      +'<td><div style="display:flex;align-items:center;gap:4px;justify-content:center;">'
      +'<input class="cell center" type="number" value="'+(md.pct||cl.defaultPct)+'" step="0.5" min="0" max="100"'
      +' onchange="cdata[\''+id+'\'].marketData[\''+m+'\'].pct=parseFloat(this.value)||0;saveMarketData(\''+id+'\',\''+m+'\');renderClient(\''+id+'\')"'
      +' style="width:64px;font-size:15px;font-weight:700;"/>'
      +'<span style="font-size:15px;font-weight:700;color:#888;">%</span></div></td>'
      +'<td style="text-align:right"><div class="val c-green">$'+fmt(commM)+'</div>'
      +'<div style="font-size:11px;color:#888;">'+(md.pct||cl.defaultPct)+'% of $'+fmt(iUSD)+'</div></td>'
      +'</tr>';
  }).join('');

  const adSpendRows=cl.markets.map(m=>{
    const md=cd.marketData[m]||{adSpend:0};
    const ccy=CCY[m];const rate=fxRate(ccy);const usd=toUSD(md.adSpend||0,ccy);
    return '<tr>'
      +'<td style="padding:6px 8px;font-weight:600;">'+m+'</td>'
      +'<td style="padding:6px 8px;color:#888;">'+ccy+'</td>'
      +'<td style="padding:6px 8px;text-align:right;">'
      +'<input type="number" value="'+Math.round(md.adSpend||0)+'" step="1" placeholder="0"'
      +' onchange="cdata[\''+id+'\'].marketData[\''+m+'\'].adSpend=parseFloat(this.value)||0;saveMarketData(\''+id+'\',\''+m+'\');renderClient(\''+id+'\')"'
      +' style="width:110px;font-size:13px;padding:4px 7px;border:1px solid #ddd;border-radius:5px;text-align:right;background:#fff;color:#1a1a1a;outline:none;"/>'
      +' <span style="font-size:11px;color:#888;">'+ccy+'</span></td>'
      +'<td style="padding:6px 8px;text-align:right;color:#888;font-size:12px;">'+rate.toFixed(4)+'</td>'
      +'<td style="padding:6px 8px;text-align:right;font-weight:600;color:#1a5fa8;">$'+fmt(usd)+'</td>'
      +'</tr>';
  }).join('');

  const extrasRows=(cd.extraCharges||[]).map((ch,i)=>'<tr>'
    +'<td><input class="cell" type="text" value="'+ch.desc+'" onchange="cdata[\''+id+'\'].extraCharges['+i+'].desc=this.value;saveExtra(\''+id+'\','+i+')"/></td>'
    +'<td><input class="cell right" type="number" value="'+Math.round(ch.amt)+'" step="1" onchange="cdata[\''+id+'\'].extraCharges['+i+'].amt=parseFloat(this.value)||0;saveExtra(\''+id+'\','+i+')"/></td>'
    +'<td style="text-align:right" class="val c-amber">$'+fmt(ch.amt)+'</td>'
    +'<td><button class="btn btn-sm btn-danger" onclick="deleteExtra(\''+id+'\','+i+')">✕</button></td>'
    +'</tr>'
  ).join('');

  document.getElementById('content').innerHTML=
    '<div class="period-bar"><span style="font-size:12px;font-weight:600;color:#888;">PERIOD</span>'
    +monthSelect("selectedMonth=this.value;loadFromSupabase().then(()=>renderClient('"+id+"'))")
    +yearSelect("selectedYear=parseInt(this.value);loadFromSupabase().then(()=>renderClient('"+id+"'))")
    +'</div>'
    +fxBarHTML("renderClient('"+id+"')")
    +'<div class="totals-grid">'
    +'<div class="tot-card"><div class="tot-label">Total income (USD)</div><div class="tot-val c-blue">$'+fmt(clientIncomeUSD(id))+'</div></div>'
    +'<div class="tot-card"><div class="tot-label">Commission earned</div><div class="tot-val c-green">$'+fmt(commTot)+'</div></div>'
    +'<div class="tot-card"><div class="tot-label">PPC automation</div><div class="tot-val c-purple">$'+fmt(ppcTot)+'</div></div>'
    +'<div class="tot-card"><div class="tot-label">Total due from client</div><div class="tot-val c-amber">$'+fmt(grandTot)+'</div></div>'
    +'</div>'
    +'<div class="card"><div class="card-title">Marketplace breakdown</div>'
    +'<div class="tbl-wrap"><table>'
    +'<thead><tr><th>Market</th><th>Status</th>'
    +'<th style="min-width:130px">Income (original)</th>'
    +'<th style="text-align:right;min-width:120px">Income (USD)</th>'
    +'<th style="text-align:center;min-width:100px">Comm %</th>'
    +'<th style="text-align:right;min-width:130px">Commission (USD)</th></tr></thead>'
    +'<tbody>'+mktRows+'</tbody></table></div></div>'
    +'<div class="ppc-card"><div class="ppc-title">🤖 PPC automation fees</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">'
    +'<div style="background:#fff;border:1px solid #c0bce8;border-radius:8px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;">'
    +'<div><div style="font-size:11px;color:#888;text-transform:uppercase;margin-bottom:3px;">Basic fee</div>'
    +'<div style="font-size:13px;color:#555;">'+(cl.ppcBasic?'Fixed monthly':'Not applicable')+'</div></div>'
    +'<div style="font-size:22px;font-weight:700;color:#4a3fe8;">'+(cl.ppcBasic?'$350':'—')+'</div></div>'
    +'<div style="background:#fff;border:1px solid #c0bce8;border-radius:8px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;">'
    +'<div><div style="font-size:11px;color:#888;text-transform:uppercase;margin-bottom:3px;">Ad spend fee rate</div>'
    +'<div style="font-size:13px;color:#555;">Applied to total ad spend</div></div>'
    +'<div style="font-size:22px;font-weight:700;color:#4a3fe8;">'+cl.ppcAdPct+'%</div></div></div>'
    +'<div style="background:#fff;border:2px solid #c0bce8;border-radius:10px;padding:16px;margin-bottom:12px;">'
    +'<div style="font-size:12px;font-weight:700;color:#4a3fe8;text-transform:uppercase;margin-bottom:12px;">📊 Ad spend per market</div>'
    +'<div style="overflow-x:auto;margin-bottom:14px;">'
    +'<table style="width:100%;border-collapse:collapse;font-size:12px;">'
    +'<thead><tr style="background:#f8f7ff;">'
    +'<th style="padding:7px 8px;text-align:left;font-weight:600;color:#666;border-bottom:1px solid #e0ddf8;">Market</th>'
    +'<th style="padding:7px 8px;font-weight:600;color:#666;border-bottom:1px solid #e0ddf8;">CCY</th>'
    +'<th style="padding:7px 8px;text-align:right;font-weight:600;color:#666;border-bottom:1px solid #e0ddf8;">Ad spend (original)</th>'
    +'<th style="padding:7px 8px;text-align:right;font-weight:600;color:#666;border-bottom:1px solid #e0ddf8;">FX rate</th>'
    +'<th style="padding:7px 8px;text-align:right;font-weight:600;color:#666;border-bottom:1px solid #e0ddf8;">Ad spend (USD)</th>'
    +'</tr></thead><tbody>'+adSpendRows+'</tbody>'
    +'<tfoot><tr style="background:#f0efff;">'
    +'<td colspan="4" style="padding:8px;font-weight:700;font-size:13px;color:#4a3fe8;">Total ad spend (USD)</td>'
    +'<td style="padding:8px;text-align:right;font-weight:700;font-size:15px;color:#4a3fe8;">$'+fmt(adSpendUSD)+'</td>'
    +'</tr></tfoot></table></div>'
    +'<div style="background:#f0efff;border-radius:8px;padding:14px 16px;">'
    +'<div style="font-size:12px;color:#666;margin-bottom:10px;font-weight:600;">Fee formula</div>'
    +'<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">'
    +'<div style="text-align:center;flex:1;min-width:120px;">'
    +'<div style="font-size:11px;color:#888;margin-bottom:4px;">Total ad spend (USD)</div>'
    +'<div style="font-size:18px;font-weight:700;color:#1a1a1a;background:#fff;border:1px solid #c0bce8;border-radius:6px;padding:8px 12px;">$'+fmt(adSpendUSD)+'</div></div>'
    +'<div style="font-size:26px;color:#c0bce8;font-weight:300;">×</div>'
    +'<div style="text-align:center;">'
    +'<div style="font-size:11px;color:#888;margin-bottom:4px;">Fee rate</div>'
    +'<div style="font-size:18px;font-weight:700;color:#4a3fe8;background:#fff;border:1px solid #c0bce8;border-radius:6px;padding:8px 12px;">'+cl.ppcAdPct+'%</div></div>'
    +'<div style="font-size:26px;color:#c0bce8;font-weight:300;">=</div>'
    +'<div style="text-align:center;flex:1;min-width:120px;">'
    +'<div style="font-size:11px;color:#888;margin-bottom:4px;">Ad spend fee to collect</div>'
    +'<div style="font-size:22px;font-weight:700;color:#fff;background:#4a3fe8;border-radius:6px;padding:8px 14px;">$'+fmt(ppcAdAmt)+'</div></div>'
    +'</div></div></div>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding:12px 16px;background:#fff;border:2px solid #4a3fe8;border-radius:8px;">'
    +'<div style="font-size:15px;font-weight:700;">Total PPC automation fees</div>'
    +'<div style="font-size:24px;font-weight:700;color:#4a3fe8;">$'+fmt(ppcTot)+'</div></div></div>'
    +(extrasRows
      ?'<div class="card"><div class="card-title">Extra charges (USD)</div>'
       +'<div class="tbl-wrap" style="margin-bottom:12px;"><table>'
       +'<thead><tr><th>Description</th><th>Amount (USD)</th><th style="text-align:right">Total</th><th></th></tr></thead>'
       +'<tbody>'+extrasRows+'</tbody></table></div>'
       +'<button class="btn btn-sm" onclick="addExtra(\''+id+'\')">+ Add charge</button></div>'
      :'<div class="card"><div class="card-title">Extra charges (USD)</div>'
       +'<button class="btn btn-sm" onclick="addExtra(\''+id+'\')">+ Add charge</button></div>')
    +'<div class="card" style="background:#fafaf8;border-color:#e0e0d0;">'
    +'<div class="card-title">Invoice summary</div>'
    +'<table style="width:100%;font-size:14px;border-collapse:collapse;">'
    +'<tr><td style="padding:7px 0;color:#555;">Commission on sales</td><td style="text-align:right;font-weight:600;">$'+fmt(commTot)+'</td></tr>'
    +'<tr><td style="padding:7px 0;color:#555;">PPC automation fees</td><td style="text-align:right;font-weight:600;">$'+fmt(ppcTot)+'</td></tr>'
    +(cd.extraCharges||[]).map(c=>'<tr><td style="padding:7px 0;color:#555;">'+c.desc+'</td><td style="text-align:right;font-weight:600;">$'+fmt(c.amt)+'</td></tr>').join('')
    +'<tr><td colspan="2"><div style="height:1px;background:#ddd;margin:8px 0;"></div></td></tr>'
    +'<tr><td style="padding:6px 0;font-size:16px;font-weight:700;">Total due from '+cl.name+'</td>'
    +'<td style="text-align:right;font-size:24px;font-weight:700;color:#b36b00;">$'+fmt(grandTot)+'</td></tr>'
    +'</table></div>'
    +'<div class="card"><div class="card-title">Upload reports for '+cl.name+'</div>'
    +'<div class="upload-zone" onclick="triggerUpload()"'
    +' ondragover="event.preventDefault();this.classList.add(\'drag\')"'
    +' ondragleave="this.classList.remove(\'drag\')"'
    +' ondrop="event.preventDefault();this.classList.remove(\'drag\');handleFiles(Array.from(event.dataTransfer.files))">'
    +'<div style="font-size:24px;margin-bottom:6px;">📂</div>'
    +'<div style="font-size:13px;font-weight:600;color:#333;margin-bottom:3px;">Drop PDFs or click to browse</div>'
    +'<div style="font-size:12px;color:#888;">e.g. '+cl.name+' - USA - '+selectedMonth+' - '+selectedYear+'.pdf</div>'
    +'</div><div id="upload-results"></div></div>';
}

async function addExtra(id){
  const ch={desc:'Extra charge',amt:0};
  cdata[id].extraCharges.push(ch);
  // Save to Supabase
  const idx=cdata[id].extraCharges.length-1;
  await saveExtra(id,idx);
  renderClient(id);
}

// ── Settings ──────────────────────────────────────────────────────
function renderSettings(){
  document.getElementById('content').innerHTML=`
    <div class="card">
      <div class="card-title">FX Rates → USD</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
        ${['EUR','CAD','GBP'].map(c=>`<div>
          <label class="form-label">${c} → USD</label>
          <input class="form-input" type="number" value="${fx[c]}" step="0.0001" onchange="fx['${c}']=parseFloat(this.value)||1"/>
        </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Commission % per market</div>
      ${Object.entries(CLIENTS).map(([id,cl])=>`
        <div style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #f0f0ea;">
          <div style="font-weight:700;font-size:14px;margin-bottom:10px;">${cl.name}
            <span style="font-size:12px;color:#888;font-weight:400;">· PPC ad: ${cl.ppcAdPct}%${cl.ppcBasic?' · $350 basic':' · no basic fee'}</span></div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            ${cl.markets.map(m=>`<div style="text-align:center;">
              <div style="font-size:11px;color:#888;margin-bottom:3px;">${m}</div>
              <div style="display:flex;align-items:center;gap:2px;">
                <input style="width:60px;font-size:14px;font-weight:700;text-align:center;padding:5px;border:1px solid #ccc;border-radius:6px;"
                  type="number" value="${cdata[id].marketData[m]?.pct||cl.defaultPct}" step="0.5" min="0" max="100"
                  onchange="cdata['${id}'].marketData['${m}'].pct=parseFloat(this.value)||0;saveMarketData('${id}','${m}')"/>
                <span style="font-size:13px;color:#888;">%</span>
              </div></div>`).join('')}
          </div>
        </div>`).join('')}
    </div>`;
}

// ── Print Invoice ─────────────────────────────────────────────────
function printInvoice(id){
  const cl=CLIENTS[id];const cd=cdata[id];
  const commTot=clientCommUSD(id),ppcTot=clientPPC(id),extrasTot=clientExtras(id);
  const grandTot=commTot+ppcTot+extrasTot;
  const period=`${selectedMonth} ${selectedYear}`;
  const adSpendUSD=clientAdSpendUSD(id);
  const ppcAdAmt=adSpendUSD*(cl.ppcAdPct/100);
  const mktRows=cl.markets.map(m=>{
    const md=cd.marketData[m]||{income:0,pct:cl.defaultPct};
    const ccy=CCY[m];const rate=fxRate(ccy);const iUSD=toUSD(md.income||0,ccy);const commM=iUSD*((md.pct||0)/100);
    return `<tr><td>${m}</td><td>${ccy}</td><td class="r">${fmt(md.income||0)} ${ccy}</td>
      <td class="r" style="color:#666;font-size:12px;">${ccy==='USD'?'1.0000':rate.toFixed(4)}</td>
      <td class="r">$${fmt(iUSD)}</td><td class="c">${md.pct||cl.defaultPct}%</td>
      <td class="r"><strong>$${fmt(commM)}</strong></td></tr>`;
  }).join('');
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>Invoice — ${cl.name} — ${period}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#1a1a1a;padding:36px 40px;}
    .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:18px;border-bottom:3px solid #4a3fe8;}
    .logo{height:36px;}.inv-title{font-size:22px;font-weight:700;color:#4a3fe8;}
    .inv-meta{font-size:12px;color:#666;margin-top:3px;}
    .client-box{background:#f5f4ff;border-left:4px solid #4a3fe8;padding:12px 16px;margin-bottom:22px;border-radius:0 8px 8px 0;}
    .client-box h2{font-size:15px;font-weight:700;color:#4a3fe8;margin-bottom:3px;}
    .sec-title{font-size:11px;font-weight:700;color:#4a3fe8;text-transform:uppercase;letter-spacing:0.07em;margin:18px 0 8px;}
    table{width:100%;border-collapse:collapse;margin-bottom:8px;}
    th{font-size:11px;font-weight:700;color:#666;padding:7px 8px;border-bottom:2px solid #eee;text-align:left;background:#fafaf8;}
    td{padding:7px 8px;border-bottom:1px solid #f0f0ea;}
    tfoot td{font-weight:700;background:#f8f8f4;border-top:2px solid #ddd;}
    .r{text-align:right;}.c{text-align:center;}
    .fx-note{font-size:11px;color:#888;background:#f8f8f4;border-radius:6px;padding:8px 12px;margin-bottom:16px;}
    .ppc-box{background:#f5f4ff;border:1px solid #c0bce8;border-radius:8px;padding:14px 16px;margin-bottom:16px;}
    .ppc-box h3{font-size:12px;font-weight:700;color:#4a3fe8;margin-bottom:10px;text-transform:uppercase;}
    .ppc-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid #e8e8f8;}
    .ppc-row:last-child{border:none;}
    .ppc-total{display:flex;justify-content:space-between;padding:9px 0 0;font-weight:700;font-size:14px;color:#4a3fe8;}
    .summary{background:#f8f8f4;border-radius:8px;padding:16px 20px;margin-top:16px;}
    .sum-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid #eee;}
    .sum-grand{display:flex;justify-content:space-between;padding:12px 0 0;margin-top:6px;border-top:2px solid #ccc;font-size:20px;font-weight:700;}
    .c-green{color:#1a7a3a;}.c-purple{color:#4a3fe8;}.c-amber{color:#b36b00;}
    .footer{margin-top:28px;padding-top:14px;border-top:1px solid #eee;font-size:11px;color:#aaa;text-align:center;}
    @media print{@page{margin:1.5cm;}body{padding:0;}}
  </style></head><body>
  <div class="header">
    <img class="logo" src="data:image/png;base64,${LOGO_B64}" alt="Marketix"/>
    <div style="text-align:right;">
      <div class="inv-title">Fee Statement</div>
      <div class="inv-meta">${period}</div>
      <div class="inv-meta" style="margin-top:6px;font-weight:700;color:#1a1a1a;">Bill to: ${cl.name}</div>
    </div>
  </div>
  <div class="client-box"><h2>${cl.name}</h2>
    <div style="font-size:12px;color:#555;">Active markets: ${cl.markets.join(' · ')} | Period: ${period}</div>
  </div>
  <div class="sec-title">Commission breakdown by marketplace</div>
  <table>
    <thead><tr><th>Market</th><th>CCY</th><th class="r">Income (orig.)</th><th class="r">FX rate</th><th class="r">Income (USD)</th><th class="c">Rate</th><th class="r">Commission</th></tr></thead>
    <tbody>${mktRows}</tbody>
    <tfoot><tr><td colspan="3"><strong>Total</strong></td><td></td><td class="r"><strong>$${fmt(clientIncomeUSD(id))}</strong></td><td></td><td class="r"><strong>$${fmt(commTot)}</strong></td></tr></tfoot>
  </table>
  <div class="fx-note"><strong>FX rates applied:</strong> EUR 1 = $${fx.EUR.toFixed(4)} · CAD 1 = $${fx.CAD.toFixed(4)} · GBP 1 = $${fx.GBP.toFixed(4)}</div>
  <div class="ppc-box"><h3>PPC automation fees</h3>
    ${cl.ppcBasic?`<div class="ppc-row"><span>Basic fee (fixed monthly)</span><span><strong>$350</strong></span></div>`:''}
    <div class="ppc-row"><span>Ad spend ($${fmt(adSpendUSD)} USD × ${cl.ppcAdPct}%)</span><span><strong>$${fmt(ppcAdAmt)}</strong></span></div>
    <div class="ppc-total"><span>Total PPC fees</span><span>$${fmt(ppcTot)}</span></div>
  </div>
  ${(cd.extraCharges||[]).length?`<div class="sec-title">Additional charges</div>
  <table><thead><tr><th>Description</th><th class="r">Amount</th></tr></thead>
  <tbody>${(cd.extraCharges||[]).map(c=>`<tr><td>${c.desc}</td><td class="r"><strong>$${fmt(c.amt)}</strong></td></tr>`).join('')}</tbody></table>`:''}
  <div class="summary">
    <div class="sum-row"><span>Commission on sales</span><span class="c-green"><strong>$${fmt(commTot)}</strong></span></div>
    <div class="sum-row"><span>PPC automation fees</span><span class="c-purple"><strong>$${fmt(ppcTot)}</strong></span></div>
    ${(cd.extraCharges||[]).map(c=>`<div class="sum-row"><span>${c.desc}</span><span><strong>$${fmt(c.amt)}</strong></span></div>`).join('')}
    <div class="sum-grand"><span>Total due</span><span class="c-amber">$${fmt(grandTot)}</span></div>
  </div>
  <div class="footer">Marketix · Generated ${new Date().toLocaleDateString()} · All amounts in USD</div>
  <script>window.onload=()=>window.print();<\/script>
  </body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();
}
